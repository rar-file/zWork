name: Build & Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.3.0"
        required: false
        type: string

jobs:
  build:
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            build_script: scripts/build-linux-release.sh
          - os: windows-latest
            platform: windows
            build_script: scripts/build-windows-release.ps1

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify updater signing secret
        shell: bash
        run: |
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY is missing. Add the updater private key as a GitHub Actions secret."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend deps
        run: npm ci
        working-directory: app

      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        run: bash ${{ matrix.build_script }}

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File ${{ matrix.build_script }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-build
          path: dist/*

  macos-backend:
    name: macOS backend (${{ matrix.arch }})
    strategy:
      matrix:
        include:
          - arch: x86_64
            os: macos-15-intel
            target: x86_64-apple-darwin
          - arch: aarch64
            os: macos-15
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build backend
        run: bash scripts/build-backend.sh ${{ matrix.target }}

      - name: Upload backend
        uses: actions/upload-artifact@v4
        with:
          name: macos-backend-${{ matrix.arch }}
          path: app/src-tauri/binaries/zwork-backend-${{ matrix.target }}

  macos-universal:
    name: macOS universal build
    needs: macos-backend
    runs-on: macos-15-intel
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify updater signing secret
        shell: bash
        run: |
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY is missing. Add the updater private key as a GitHub Actions secret."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Install frontend deps
        run: npm ci
        working-directory: app

      - name: Download Intel backend
        uses: actions/download-artifact@v4
        with:
          name: macos-backend-x86_64
          path: app/src-tauri/binaries

      - name: Download Apple Silicon backend
        uses: actions/download-artifact@v4
        with:
          name: macos-backend-aarch64
          path: app/src-tauri/binaries

      - name: Build universal macOS app
        run: bash scripts/build-macos-universal-release.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: dist/*

  release:
    needs: [build, macos-universal]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.tag != '')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
          pattern: "*-build"

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release body
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          VERSION_NUM="${VERSION#v}"
          python3 -c "
          import re
          with open('CHANGELOG.md') as f:
              text = f.read()
          # extract the section for this version
          pattern = r'## v' + re.escape('${VERSION_NUM}') + r'\n(.*?)(?=\n## |\Z)'
          m = re.search(pattern, text, re.DOTALL)
          changes = m.group(1).strip() if m else 'See CHANGELOG.md for details.'
          body = '''Download zWork for your platform:

          | Platform | File |
          |----------|------|
          | **Linux** | \`zWork-linux-x86_64.AppImage\` |
          | **macOS** | \`zWork-macos-universal.dmg\` |
          | **Windows** | \`zWork-windows-x86_64-setup.exe\` |

          ### Install

          **Linux**:
          \`\`\`bash
          curl -fsSL https://raw.githubusercontent.com/Ryz3nPlayZ/zWork/main/scripts/install.sh | bash
          \`\`\`

          **macOS**: download \`zWork-macos-universal.dmg\`, open it, then drag zWork to Applications.

          **Windows**:
          \`\`\`powershell
          irm https://raw.githubusercontent.com/Ryz3nPlayZ/zWork/main/scripts/install-windows.ps1 | iex
          \`\`\`
          If SmartScreen appears, click \"More info\" then \"Run anyway\".

          ---

          ## What\'s new

          ''' + changes
          with open('/tmp/release-body.md', 'w') as f:
              f.write(body)
          "

      - name: Build updater manifest
        run: python3 scripts/generate-updater-manifest.py --dist dist --tag "${{ steps.version.outputs.tag }}" --repo "Ryz3nPlayZ/zWork"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: dist/*
          body_path: /tmp/release-body.md
