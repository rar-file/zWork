name: Build & Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            build_script: scripts/build-linux-release.sh
            artifact_pattern: zWork-linux-*.AppImage
          - os: macos-latest
            platform: macos
            build_script: scripts/build-macos-release.sh
            artifact_pattern: zWork-macos-*.dmg
          - os: windows-latest
            platform: windows
            build_script: scripts/build-windows-release.ps1
            artifact_pattern: zWork-windows-*-setup.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend deps
        run: npm ci
        working-directory: app

      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        run: bash ${{ matrix.build_script }}

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File ${{ matrix.build_script }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-build
          path: dist/${{ matrix.artifact_pattern }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Extract version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build release body
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          VERSION_NUM="${VERSION#v}"
          python3 -c "
          import re
          with open('CHANGELOG.md') as f:
              text = f.read()
          # extract the section for this version
          pattern = r'## v' + re.escape('${VERSION_NUM}') + r'\n(.*?)(?=\n## |\Z)'
          m = re.search(pattern, text, re.DOTALL)
          changes = m.group(1).strip() if m else 'See CHANGELOG.md for details.'
          body = '''Download zWork for your platform:

          | Platform | File |
          |----------|------|
          | **Linux** | \`zWork-linux-x86_64.AppImage\` |
          | **macOS** | \`zWork-macos-aarch64.dmg\` |
          | **Windows** | \`zWork-windows-x86_64-setup.exe\` |

          ### Install

          **Linux** - one command:
          \`\`\`bash
          curl -fsSL https://raw.githubusercontent.com/Ryz3nPlayZ/zWork/main/scripts/install.sh | bash
          \`\`\`

          **macOS** - download the \`.dmg\`, open it, drag zWork to Applications.

          **Windows** - download the installer and run it. If you see a SmartScreen warning, click \"More info\" then \"Run anyway\".

          ---

          ## What\'s new

          ''' + changes
          with open('/tmp/release-body.md', 'w') as f:
              f.write(body)
          "

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body_path: /tmp/release-body.md
